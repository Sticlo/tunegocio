<section class="admin-login">
  <div class="admin-login__card">
    <h1>Panel de administración</h1>
    <p>Administra el catálogo de productos y categorías.</p>

    @if (!firebaseEnabled) {
      <div class="admin-alert admin-alert--warn">
        El panel aún no está conectado. Contacta al soporte técnico para activarlo.
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Correo
        <input type="email" formControlName="email" autocomplete="username" />
      </label>

      <label>
        Contraseña
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      @if (auth.error()) {
        <p class="admin-error">{{ auth.error() }}</p>
      }

      <button class="btn btn--gold" type="submit" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <a class="admin-login__back" routerLink="/">Volver al sitio</a>
  </div>
</section>
