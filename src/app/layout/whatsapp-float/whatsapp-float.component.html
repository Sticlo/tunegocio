<div class="floating-actions">
  <div class="floating-actions__slot floating-actions__slot--call">

      <span class="floating-actions__ring"></span>
      <span class="floating-actions__ring"></span>
      <span class="floating-actions__ring"></span>
    </span>
    <a
      class="floating-actions__btn floating-actions__btn--call"
      [href]="phoneUrl"
      aria-label="Llamar por teléfono"
    >
      <span class="floating-actions__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor">
