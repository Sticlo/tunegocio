<section class="page-hero">
  <div class="container">
    <app-breadcrumb [items]="breadcrumbs" />
    <h1>Categorías de equipos industriales</h1>
    <p class="page-hero__text">
      Explora nuestro catálogo por categoría: hornos, estufas, extracción, maquinaria y más.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="grid grid--categories grid--categories-showcase">
      @for (category of categories; track category.slug; let i = $index) {
        <app-category-card
          [category]="category"
          [animationDelay]="i * 60 + 'ms'"
          variant="showcase"
        />
      }
    </div>
  </div>
</section>
