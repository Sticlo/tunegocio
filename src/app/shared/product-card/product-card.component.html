<article class="product-card">
  <a class="product-card__media" [routerLink]="['/productos', product().slug]">
    <img
      [src]="assetUrl(product().image)"
      [alt]="product().imageAlt || product().name + ' - equipos industriales TUNEGOCIO.COM'"
      width="400"
      height="300"
      loading="lazy"
      decoding="async"
    />
  </a>

  <div class="product-card__body">
    <h3>
      <a [routerLink]="['/productos', product().slug]">{{ product().name }}</a>
    </h3>
    <p>{{ product().shortDescription }}</p>
    <div class="product-card__footer">
      <div class="product-card__prices">
        @if (product().compareAtPriceLabel) {
          <span class="product-card__price product-card__price--was">{{ product().compareAtPriceLabel }}</span>
          <span class="product-card__badge">Oferta</span>
        }
        <span class="product-card__price" [class.product-card__price--sale]="!!product().compareAtPriceLabel">
          {{ product().priceLabel }}
        </span>
      </div>
      <div class="product-card__actions">
        @if (product().price > 0) {
          <button type="button" class="btn btn--gold btn--sm" (click)="onAddToCart()">
            Añadir al carrito
          </button>
        } @else {
          <a class="btn btn--gold btn--sm" [routerLink]="['/productos', product().slug]">
            Leer más
          </a>
        }
        <a class="product-card__link" [routerLink]="['/productos', product().slug]">Ver ficha</a>
      </div>
    </div>
  </div>
</article>
